name: Auto Publish to Edge
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  edge-publish:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    
    steps:
      - name: Check conditions
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'edge-release.yml',
              status: 'success',
              per_page: 1
            });
            
            let lastRunDate = new Date(0);
            if (runs.workflow_runs.length > 0) {
              lastRunDate = new Date(runs.workflow_runs[0].updated_at);
            }
            
            const now = new Date();
            const diffDays = (now - lastRunDate) / (1000 * 60 * 60 * 24);
            
            if (context.eventName === 'schedule' && diffDays < 7) {
              console.log(`Last run was ${diffDays.toFixed(1)} days ago, less than 7 days. Skipping.`);
              core.setOutput('skip', 'true');
              return;
            }
            
            let latestRelease;
            try {
              const { data: release } = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              latestRelease = release;
            } catch (e) {
              console.log("No releases found.");
              core.setOutput('skip', 'true');
              return;
            }
            
            const releaseDate = new Date(latestRelease.published_at);
            
            if (context.eventName !== 'workflow_dispatch' && releaseDate <= lastRunDate) {
              console.log("No new release since last edge publish. Skipping.");
              core.setOutput('skip', 'true');
              return;
            }
            
            console.log(`Conditions met. Proceeding with publish for tag ${latestRelease.tag_name}.`);
            core.setOutput('skip', 'false');
            core.setOutput('tag_name', latestRelease.tag_name);

      - name: Download extension zip
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ steps.check.outputs.tag_name }} -p "simple-url-redirector-chromium.zip" --repo ${{ github.repository }}

      - name: Publish to Edge Add-ons
        if: steps.check.outputs.skip == 'false'
        uses: wdzeng/edge-addon@v2
        with:
          product-id: ${{ secrets.EDGE_PRODUCT_ID }}
          zip-path: simple-url-redirector-chromium.zip
          client-id: ${{ secrets.EDGE_CLIENT_ID }}
          api-key: ${{ secrets.EDGE_API_KEY }}
