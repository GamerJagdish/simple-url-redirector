<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Simple URL Redirector</title>
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="head">
    <div class="brand">Simple URL Redirector</div>
    <button class="head-btn" id="openOptions" title="Open Full View">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
      <span>Full view</span>
    </button>
  </div>

  <div class="row">
    <div class="row-label">
      Active
      <span class="count" id="ruleCount">0 rules active</span>
    </div>
    <label class="switch">
      <input type="checkbox" id="masterToggle" />
      <span class="slider"></span>
    </label>
  </div>

  <div id="emptyState" class="empty" style="display:none;">
    No rules yet. Add a URL pair to start redirecting.
  </div>

  <div class="rules-section">
    <div class="add-row">
      <div class="add-row-top">
        <div class="segmented-control" tabindex="0">
          <input type="checkbox" id="advancedToggle" class="segmented-input" aria-label="Advanced mode">
          <div class="segmented-track">
            <div class="segmented-glider"></div>
            <span class="segment-btn segment-simple">Simple</span>
            <span class="segment-btn segment-advanced">Advanced</span>
          </div>
        </div>
      </div>
      <div id="simpleInputs" class="add-row-inputs">
        <input type="text" id="fromInput" placeholder="From, e.g. redditez.com" />
        <span class="arrow">to</span>
        <input type="text" id="toInput" placeholder="To, e.g. reddit.com" />
      </div>
      <div id="advancedInputs" class="advanced-row-inputs" style="display:none;">
        <input type="text" id="regexFromInput" placeholder="From regex, e.g. ^https://(www\.)?redditez\.com" />
        <input type="text" id="regexToInput" placeholder="To substitution, e.g. https://reddit.com" />
        <input type="text" id="regexTestInput" placeholder="Test URL (optional)" />
        <div id="regexTestResult" class="test-result"></div>
      </div>
      <div style="display:flex; gap:8px; margin-top: 8px;">
        <button class="secondary" id="cancelEditBtn" style="display: none; margin-top: 0; flex: 1;">Cancel</button>
        <button class="add" id="addBtn" style="margin-top: 0; flex: 1;">Add rule</button>
      </div>
    </div>

    <ul id="ruleList"></ul>
  </div>

  <div id="toast" class="toast" style="display:none;">
    <span id="toastMsg">Rule deleted.</span>
    <button id="undoBtn" class="undo-btn">Undo</button>
  </div>

  <script src="rules-common.js"></script>
  <script src="popup.js"></script>
</body>

</html>
